{% extends "base.html" %}

{% block title %}Forgot Password | J'Bistro Restaurant{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-background"></div>
    <div class="auth-overlay"></div>
    <div class="wood-strip"></div>

    <div class="auth-card-wrap">
        <div class="auth-card">
            <img src="{{ url_for('static', filename='images/plogo.png') }}" alt="J'Bistro Restaurant Logo" class="auth-logo">
            <p class="auth-title">Reset Password</p>
            <p class="auth-support-text">Enter your account email and we will send a password reset link if the account exists.</p>

            <form action="{{ url_for('forgot_password') }}" method="post" class="auth-form">
                <label>
                    Email
                    <input type="email" name="email" placeholder="Enter your email" required>
                </label>
                <button type="submit" class="auth-button">Send Reset Link</button>
            </form>

            <p class="auth-footer-text">
                Remember your password?
                <a href="{{ url_for('login') }}">Back to login</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
