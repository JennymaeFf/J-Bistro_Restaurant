<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J'Bistro Verification Code</title>
</head>
<body style="margin:0; padding:0; background-color:#f8ead2; font-family:Arial, Helvetica, sans-serif; color:#2f2118;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; background-color:#f8ead2; margin:0; padding:28px 12px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="width:100%; max-width:520px; background-color:#fff6e8; border:1px solid #e6c98f; border-radius:18px; overflow:hidden;">
                    <tr>
                        <td align="center" style="background-color:#4b2e1f; padding:24px 20px;">
                            <div style="font-family:Georgia, 'Times New Roman', serif; font-size:30px; line-height:36px; font-weight:bold; color:#fff6e8;">J'Bistro</div>
                            <div style="font-size:13px; line-height:20px; color:#f4dfbb;">Restaurant Verification</div>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:34px 26px 16px;">
                            <p style="margin:0 0 18px; font-size:18px; line-height:28px; color:#4b2e1f;">Your J'Bistro verification code is:</p>
                            <div style="display:inline-block; padding:18px 28px; background-color:#fffaf1; border:2px solid #d9a441; border-radius:14px; font-size:36px; line-height:42px; font-weight:bold; letter-spacing:8px; color:#4b2e1f;">{{ otp_code|default('123456') }}</div>
                            <p style="margin:22px 0 0; font-size:15px; line-height:24px; color:#7b604c;">This code will expire in 5 minutes</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:12px 26px 32px;">
                            <p style="margin:0; font-size:13px; line-height:21px; color:#8a6a52;">If you did not request this code, you can safely ignore this email.</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="background-color:#f4dfbb; padding:16px 20px;">
                            <p style="margin:0; font-size:12px; line-height:18px; color:#6c4d37;">J'Bistro Restaurant</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
