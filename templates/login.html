{% extends "base.html" %}

{% block title %}Login | J'Bistro Restaurant{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-background"></div>
    <div class="auth-overlay"></div>
    <div class="wood-strip"></div>

    <div class="auth-card-wrap">
        <div class="auth-card">
            <img src="{{ url_for('static', filename='images/plogo.png') }}" alt="J'Bistro Restaurant Logo" class="auth-logo">
            <p class="auth-title">Welcome to J'Bistro</p>

            <form action="{{ url_for('login') }}" method="post" class="auth-form">
                <label>
                    Email
                    <input type="email" name="email" placeholder="Enter your email" autocomplete="email" required>
                </label>
                <label>
                    Password
                    <span class="password-field">
                        <input type="password" id="login_password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" data-target="login_password" aria-label="Show password">&#128065;</button>
                    </span>
                </label>
                <div class="auth-helper-row">
                    <a href="{{ url_for('forgot_password') }}">Forgot password?</a>
                </div>
                <button type="submit" class="auth-button">Login</button>
            </form>

            <form action="{{ url_for('resend_verification') }}" method="post" class="auth-secondary-form">
                <p class="auth-support-text">Haven’t received your verification email yet?</p>
                <label>
                    Resend verification to
                    <input type="email" name="email" placeholder="Enter your email again" autocomplete="email" required>
                </label>
                <button type="submit" class="auth-secondary-button">Resend Verification Email</button>
            </form>

            <p class="auth-footer-text">
                Don't have an account?
                <a href="{{ url_for('register') }}">Register here</a>
            </p>
        </div>
    </div>
</section>
{% endblock %}
